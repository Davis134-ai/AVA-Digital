<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA-Digital - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- LIGHT THEME · AVA‑DIGITAL COLOR SYSTEM ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: rgb(255, 255, 255);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 24px;
            color: #1A1A2E;
        }

        .container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FF7A00, #CC1177, #7B22CC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header h1 i {
            background: linear-gradient(135deg, #FF7A00, #CC1177, #7B22CC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 6px;
        }

        .header p {
            color: #5A5A7A;
            font-size: 1rem;
            font-weight: 500;
        }

        .card {
            background: #FFFFFF;
            padding: 36px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.08), 
                        0 8px 18px -6px rgba(0,0,0,0.05),
                        0 0 0 1px rgba(123, 34, 204, 0.08) inset;
            transition: box-shadow 0.2s;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #1E1E3A;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #F9F9FF;
            border: 2px solid #E2E2F0;
            border-radius: 18px;
            color: #111122;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #7B22CC;
            box-shadow: 0 0 0 4px rgba(123, 34, 204, 0.12);
            background: #FFFFFF;
        }

        .input-group input::placeholder {
            color: #9A9AB0;
            font-weight: 400;
        }

        .phone-wrapper {
            display: flex;
            align-items: stretch;
        }

        .phone-prefix {
            background: #F0EEF8;
            padding: 0 20px;
            display: flex;
            align-items: center;
            border: 2px solid #E2E2F0;
            border-right: none;
            border-radius: 18px 0 0 18px;
            color: #2C2C4A;
            font-weight: 600;
            font-size: 1rem;
        }

        .phone-wrapper input {
            border-radius: 0 18px 18px 0 !important;
            border-left: none;
        }

        .btn {
            background: linear-gradient(135deg, #7B22CC, #CC1177);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.15rem;
            padding: 16px 20px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 12px 20px -8px rgba(123, 34, 204, 0.35), 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 28px -10px rgba(204, 17, 119, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 15px -5px rgba(123,34,204,0.3);
        }

        a {
            color: #1A88FF;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        a:hover {
            color: #7B22CC;
            text-decoration: underline;
        }

        .card p {
            color: #5A5A7A;
        }

        .gradient-divider {
            margin: 24px 0 16px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #7B22CC, #CC1177, transparent);
            opacity: 0.4;
        }

        .error-message {
            color: #FF2D2D;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.8rem;
            color: #7A7A9A;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-film"></i> AVA-Digital</h1>
            <p>Login to continue</p>
        </div>

        <div class="card">
            <form id="loginForm">
                <div class="input-group">
                    <label for="phone">Phone Number (Uganda)</label>
                    <div class="phone-wrapper">
                        <span class="phone-prefix">+256</span>
                        <input type="tel" id="phone" placeholder="701234567" 
                               maxlength="9" inputmode="numeric" pattern="\d{9}" 
                               oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,9)" 
                               required>
                    </div>
                    <div class="error-message" id="phone-error" style="display: none;">Please enter exactly 9 digits</div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            
            <div class="gradient-divider"></div>
            
            <p style="text-align:center; margin-top:16px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
        
        <div class="footer-note">
            <span>Secure · Fast · Reliable</span>
        </div>
    </div>

    <script type="module">
        import { login, getCurrentUser } from './auth.js'
        
        // ----- FIX BACK NAVIGATION: If already logged in, replace login page with home -----
        const { data: { user } } = await getCurrentUser();
        if (user) {
            window.location.replace('home.html');
        }
        
        const phoneInput = document.getElementById('phone');
        const phoneError = document.getElementById('phone-error');
        const form = document.getElementById('loginForm');
        
        // Additional validation on form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const rawPhone = phoneInput.value.replace(/\D/g, '');
            if (rawPhone.length !== 9) {
                phoneError.style.display = 'block';
                phoneInput.focus();
                return;
            }
            phoneError.style.display = 'none';
            
            const phone = '+256' + rawPhone;
            const password = document.getElementById('password').value;
            
            try {
                await login(phone, password);
                // ----- FIX BACK NAVIGATION: use replace so login page is not in history -----
                window.location.replace('home.html');
            } catch (err) {
                alert('Login failed: ' + err.message);
            }
        });
        
        // Hide error when user starts typing
        phoneInput.addEventListener('input', () => {
            phoneError.style.display = 'none';
        });
    </script>
</body>
</html>
