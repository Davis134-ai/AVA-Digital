<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA-Digital - Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- LIGHT THEME · AVA‑DIGITAL COLOR SYSTEM ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: rgb(255, 255, 255);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1A1A2E;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF7A00, #CC1177, #7B22CC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.05), 0 0 0 1px rgba(123, 34, 204, 0.06);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid #7B22CC;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 40px -12px rgba(123, 34, 204, 0.15);
        }

        .card i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #7B22CC;
        }

        .card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1E1E3A;
            margin-bottom: 24px;
        }

        .btn {
            background: linear-gradient(135deg, #7B22CC, #CC1177);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 12px 20px -8px rgba(123, 34, 204, 0.35);
            transition: transform 0.15s, box-shadow 0.25s;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 28px -10px rgba(204, 17, 119, 0.4);
        }

        /* WhatsApp button variant */
        .card:last-child .btn {
            background: linear-gradient(135deg, #00BBAA, #1A88FF);
        }

        .fa-whatsapp {
            color: #00BBAA !important;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #6A6A8A;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .nav-item i {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #CC1177;
            background: rgba(204,17,119,0.04);
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Support</h2>
    <div class="card-grid">
        <div class="card">
            <i class="fas fa-comment"></i>
            <h3>Chat with personal account manager</h3>
            <a href="https://signal.me/#eu/CfXnRWNzavRM6jIukoSBGkkBWXhTVnko5jNWP_yen7pLM0znGpVE_Ld2bg8VbhJb" target="_blank" class="btn">Signal</a>
        </div>
        <div class="card">
            <i class="fab fa-whatsapp"></i>
            <h3>Chat with agent via WhatsApp</h3>
            <a href="https://wa.me/256740590134" target="_blank" class="btn">WhatsApp</a>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <a href="home.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>
    <a href="invest.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>Invest</span>
    </a>
    <a href="task.html" class="nav-item">
        <i class="fas fa-tasks"></i>
        <span>Task</span>
    </a>
    <a href="level.html" class="nav-item">
        <i class="fas fa-trophy"></i>
        <span>Level</span>
    </a>
    <a href="profile.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>Profile</span>
    </a>
</nav>

<script type="module">
    import { getCurrentUser } from './auth.js';

    // ----- PROTECTED PAGE: redirect to login if not authenticated (use replace) -----
    const { data: { user }, error: userError } = await getCurrentUser();
    if (userError || !user) {
        window.location.replace('index.html');
    }
    // Page content is static; no further logic needed
</script>
</body>
</html>
